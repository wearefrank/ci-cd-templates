  #       name: trivy-results
  #       path: trivy-results.sarif
  #   - 
  #     name: Upload to GitHub Security
  #     uses: github/codeql-action/upload-sarif@v2
  #     if: ${{ inputs.upload-sarif-to-security }}
  #     with:
  #       sarif_file: 'trivy-results.sarif'

  run-till-healthy:
    runs-on: ubuntu-latest
    if: inputs.run-frank-till-healthy-enabled
    permissions:
      contents: read
      packages: read
    needs: build
    steps:
    - uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
      with:
        disable-sudo: true
        egress-policy: audit
        allowed-endpoints: >
          github.com:443
    
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
      with:
        token: ${{ secrets.token }}

    - name: Download Image Tarball Artifact
      if: inputs.image-artifact-backend == 'gh-artifacts'
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 #8.0.0
      with:
        name: ${{ inputs.image-artifact-name }}

    - name: Load Docker Tarball
      if: inputs.image-artifact-backend == 'gh-artifacts'
      shell: bash
      run: |
        docker load --input ${{ inputs.image-artifact-file }}
        docker images -a --digests

    - name: Login to Container Registry
      if: inputs.image-artifact-backend == 'registry'
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # 3.7.0
      with:
        registry: ${{ inputs.image-registry }}
        username: ${{ secrets.registry-username == '' && github.actor || secrets.registry-username }}
        password: ${{ secrets.registry-token == '' && inputs.image-registry == 'ghcr.io' && secrets.token || secrets.registry-token }}

    - name: Build Image Ref
      id: build-image-ref
      shell: bash
      env:
        IMAGE_REGISTRY: ${{ inputs.image-registry }}
        IMAGE_REPO: ${{ inputs.image-repo }}
        IMAGE_NAME: ${{ inputs.image-name }}
        IMAGE_DIGEST: ${{ needs.build.outputs.image-digest }}
        IMAGE_TAG: ${{ inputs.version != '' && inputs.version || github.ref_name }}
      run: |
        IMAGE_REF=""
        if [[ -n "${IMAGE_REGISTRY}" ]]; then
          IMAGE_REF+="${IMAGE_REGISTRY@L}/"
        fi
        if [[ -n "${IMAGE_REPO}" ]]; then
          IMAGE_REF+="${IMAGE_REPO@L}/"
        fi
        if [[ -n "${IMAGE_NAME}" ]]; then
          IMAGE_REF+="${IMAGE_NAME@L}"
        fi

        if [[ -n "${IMAGE_REF}" && -n "${IMAGE_DIGEST}" ]]; then
          IMAGE_REF+="@${IMAGE_DIGEST}"
        elif [[ -n "${IMAGE_REF}" && -n "${IMAGE_TAG}"  ]]; then
          IMAGE_REF+=":${IMAGE_TAG@L}"
        fi

        echo "image-ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
        echo "Image Ref ([<registry>/][<repo>/]<name>[:<tag>|@<digest>]): [$IMAGE_REF]"

    - name: Pull Image From Registry
      if: inputs.image-artifact-backend == 'registry'
      shell: bash
      env:
        IMAGE_REF: ${{ steps.build-image-ref.outputs.image-ref }}
      run: |
        echo "Pulling image from registry with ref: [${IMAGE_REF}]"
        docker pull "${IMAGE_REF}"

    - name: Run Till Healthy
      uses: wearefrank/ci-cd-templates/frank-run-till-healthy@a85b79cdca04aad14e78a668220e8dcda0c3ebd3 #2.2.0
      with:
        image-ref: ${{ steps.build-image-ref.outputs.image-ref }}

